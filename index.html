<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Event Schedule</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 30px;
        }
        .search-container {
            margin-bottom: 20px;
            text-align: center;
        }
        .search-container input {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        #schedule-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .talk-card {
            background-color: #e9f5ff;
            border-left: 5px solid #0056b3;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        .talk-card.lunch-break {
            background-color: #ffe0b2;
            border-left-color: #fb8c00;
        }
        .talk-card h2 {
            margin-top: 0;
            color: #0056b3;
            font-size: 1.4em;
        }
        .talk-card.lunch-break h2 {
            color: #fb8c00;
        }
        .talk-card p {
            margin: 5px 0;
            font-size: 0.9em;
        }
        .talk-card .time {
            font-weight: bold;
            color: #007bff;
        }
        .talk-card.lunch-break .time {
            color: #e65100;
        }
        .talk-card .speakers {
            font-style: italic;
            color: #555;
        }
        .talk-card .category {
            font-size: 0.8em;
            color: #777;
            margin-top: 10px;
        }
        .talk-card .category span {
            display: inline-block;
            background-color: #d1ecf1;
            color: #0c5460;
            padding: 3px 8px;
            border-radius: 3px;
            margin-right: 5px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>1-Day Tech Event Schedule</h1>

        <div class="search-container">
            <input type="text" id="category-search" placeholder="Search by category...">
        </div>

        <div id="schedule-container">
            <!-- Talks will be rendered here by JavaScript -->
        </div>
    </div>

    <script>
        const scheduledTalksData = [
  {
    "title": "The Future of AI in Software Development",
    "speakers": [
      "Alice Smith"
    ],
    "category": [
      "AI",
      "Software Engineering"
    ],
    "duration": 60,
    "description": "Exploring the transformative impact of AI on coding, testing, and deployment workflows.",
    "id": "talk-1",
    "startTime": "10:00 AM",
    "endTime": "11:00 AM"
  },
  {
    "title": "Mastering Modern JavaScript Frameworks",
    "speakers": [
      "Bob Johnson"
    ],
    "category": [
      "JavaScript",
      "Frontend",
      "Web Development"
    ],
    "duration": 60,
    "description": "A deep dive into the latest features and best practices in React, Vue, and Angular.",
    "id": "talk-2",
    "startTime": "11:10 AM",
    "endTime": "12:10 PM"
  },
  {
    "title": "Demystifying Cloud Native Architectures",
    "speakers": [
      "Charlie Brown",
      "Diana Prince"
    ],
    "category": [
      "Cloud",
      "DevOps",
      "Architecture"
    ],
    "duration": 60,
    "description": "Understanding Kubernetes, serverless, and microservices for scalable applications.",
    "id": "talk-3",
    "startTime": "12:20 PM",
    "endTime": "01:20 PM"
  },
  {
    "id": "lunch",
    "title": "Lunch Break",
    "description": "Enjoy your meal!",
    "startTime": "01:30 PM",
    "endTime": "02:30 PM",
    "duration": 60,
    "category": [
      "Break"
    ]
  },
  {
    "title": "Effective Data Visualization Techniques",
    "speakers": [
      "Eve Adams"
    ],
    "category": [
      "Data Science",
      "UI/UX"
    ],
    "duration": 60,
    "description": "Turning complex data into compelling visual stories.",
    "id": "talk-4",
    "startTime": "02:30 PM",
    "endTime": "03:30 PM"
  },
  {
    "title": "Secure Coding Practices for Web Applications",
    "speakers": [
      "Frank White"
    ],
    "category": [
      "Security",
      "Web Development"
    ],
    "duration": 60,
    "description": "Protecting your applications from common vulnerabilities and threats.",
    "id": "talk-5",
    "startTime": "03:40 PM",
    "endTime": "04:40 PM"
  },
  {
    "title": "Beyond Relational Databases: NoSQL Options",
    "speakers": [
      "Grace Lee"
    ],
    "category": [
      "Databases",
      "Backend"
    ],
    "duration": 60,
    "description": "A comparative analysis of MongoDB, Cassandra, and other NoSQL solutions.",
    "id": "talk-6",
    "startTime": "04:50 PM",
    "endTime": "05:50 PM"
  }
];

        const scheduleContainer = document.getElementById('schedule-container');
        const searchInput = document.getElementById('category-search');

        function renderSchedule(talksToRender) {
            scheduleContainer.innerHTML = ''; // Clear previous talks
            talksToRender.forEach(talk => {
                const talkCard = document.createElement('div');
                talkCard.classList.add('talk-card');
                if (talk.id === 'lunch') {
                    talkCard.classList.add('lunch-break');
                }

                talkCard.innerHTML = `
                    <p class="time">${talk.startTime} - ${talk.endTime}</p>
                    <h2>${talk.title}</h2>
                    ${talk.speakers ? `<p class="speakers">${talk.speakers.join(', ')}</p>` : ''}
                    <p>${talk.description}</p>
                    <div class="category">
                        ${talk.category.map(cat => `<span>${cat}</span>`).join('')}
                    </div>
                `;
                scheduleContainer.appendChild(talkCard);
            });
        }

        function filterTalks() {
            const searchTerm = searchInput.value.toLowerCase();
            const filtered = scheduledTalksData.filter(talk => {
                if (talk.id === 'lunch' && searchTerm === 'break') {
                    return true;
                }
                return talk.category.some(cat => cat.toLowerCase().includes(searchTerm));
            });
            renderSchedule(filtered);
        }

        // Initial render
        renderSchedule(scheduledTalksData);

        // Event listener for search
        searchInput.addEventListener('input', filterTalks);
    </script>
</body>
</html>
